            - 攻击
            - 施法
            - 检定
            - 遇敌
            - 伤害
            - 法术
            - AC
            - 豁免
            - 命中
            - 骰
        <<: *dndCombatInsert
        递归:
          不可被其他条目激活: false
          不可激活其他条目: false
        文件: 世界书/战斗/dnd5e-战斗核心+hud

      - 名称: DND5E·骰池协议
        启用: true
